sources:
  - name: jaffle_shop
    schema: jaffle_shop
    database: raw
    description: a replica of the postgres database
    config:  
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 24
              period: hour
    tables:
      - name: customers
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
      - name: orders
        identifier: orders
        config:  
          freshness:
            warn_after:
              count: 1
              period: hour
            error_after:
              count: 2
              period: hour
