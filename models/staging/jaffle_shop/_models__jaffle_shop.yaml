models:
  - name: stg_jaffle_shop__customers
    description: description
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
    
  - name: stg_jaffle_shop__orders
    description: description
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - placed
                  - shipped
                  - completed
                  - return_pending
                  - returned