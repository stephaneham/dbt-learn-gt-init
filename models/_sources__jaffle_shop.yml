sources:
  - name: jaffle_shop
    schema: jaffle_shop
    database: raw
    tables:
      - name: customers
      - name: jaffle_shop_orders
        identifier: orders
        config:
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 24
              period: hour
          loaded_at_field: _etl_loaded_at   -- optional this line